version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: backend-dev
    container_name: heyinlin-backend
    working_dir: /app
    command: npm run dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app:cached
      - /app/node_modules
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=dev-secret-change-me
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=30d
      - DB_PATH=./data/personal-space.db
      - UPLOAD_DIR=./uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: frontend-dev
    container_name: heyinlin-frontend
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
  backend-uploads:
