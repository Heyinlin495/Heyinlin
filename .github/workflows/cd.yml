name: CD

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/heyinlin495/heyinlin/heyinlin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Docker buildx for GHA cache
      - uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to server via SSH
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            IMAGE="${{ env.IMAGE_NAME }}:${{ github.sha }}"

            # Pull new image
            docker pull "$IMAGE"

            # Stop and remove old container (ignore if not exists)
            docker stop heyinlin || true
            docker rm heyinlin || true

            # Remove dangling images
            docker image prune -f

            # Start new container
            docker run -d \
              --name heyinlin \
              --restart unless-stopped \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e DB_PATH=/app/data/personal-space.db \
              -e UPLOAD_DIR=/app/uploads \
              -v ${{ secrets.DEPLOY_DATA_DIR || '/data/heyinlin' }}:/app/data \
              -v ${{ secrets.DEPLOY_UPLOADS_DIR || '/data/heyinlin/uploads' }}:/app/uploads \
              "$IMAGE"

            # Health check
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/health > /dev/null; then
                echo "Deployed successfully"
                exit 0
              fi
              echo "Waiting for health check... ($i/30)"
              sleep 2
            done

            echo "Health check failed, rolling back"
            docker stop heyinlin
            docker rm heyinlin
            exit 1
