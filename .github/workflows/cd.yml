name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/heyinlin495/heyinlin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Docker buildx for GHA cache
      - uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Docker image
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to server via SSH (password auth)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_IMAGE: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: 22
          envs: DEPLOY_HOST,DEPLOY_USER,DEPLOY_PASSWORD,DEPLOY_IMAGE,GITHUB_ACTOR,GITHUB_TOKEN,JWT_SECRET
          script_stop: true
          script: |
            set -euo pipefail

            # Login to GHCR
            echo "$GITHUB_TOKEN" | docker login ghcr.io \
              -u "$GITHUB_ACTOR" --password-stdin

            # Pull new image
            docker pull "$DEPLOY_IMAGE"

            # Stop and remove old container (ignore if not exists)
            docker stop heyinlin || true
            docker rm heyinlin || true

            # Remove dangling images
            docker image prune -f

            # Start new container
            docker run -d \
              --name heyinlin \
              --restart unless-stopped \
              -p 3001:3001 \
              -e NODE_ENV=production \
              -e JWT_SECRET="$JWT_SECRET" \
              -e DB_PATH=/app/data/personal-space.db \
              -e UPLOAD_DIR=/app/uploads \
              -v /data/heyinlin:/app/data \
              -v /data/heyinlin/uploads:/app/uploads \
              "$DEPLOY_IMAGE"

            # Health check
            for i in $(seq 1 30); do
              if curl -sf http://localhost:3001/api/health > /dev/null; then
                echo "Deployed successfully"
                exit 0
              fi
              echo "Waiting for health check... ($i/30)"
              sleep 2
            done

            echo "Health check failed, rolling back"
            docker stop heyinlin
            docker rm heyinlin
            exit 1
